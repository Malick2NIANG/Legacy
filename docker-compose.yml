version: "3.9"

services:
  # ── Frontend React ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend
    networks:
      - ds_network
    volumes:
      - ./frontend:/app
      - /app/node_modules

  # ── Backend FastAPI ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - POSTGRES_HOST=postgres
    depends_on:
      - postgres
      - redis
      - minio
    networks:
      - ds_network
    volumes:
      - ./backend:/app

  # ── Worker Celery ───────────────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.workers.celery_app worker --loglevel=info
    env_file:
      - ./backend/.env
    environment:
      - POSTGRES_HOST=postgres
    depends_on:
      - redis
      - postgres
      - minio
    networks:
      - ds_network

  # ── Base de données PostgreSQL ──────────────────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "5436:5432"
    environment:
      POSTGRES_USER: ds_user
      POSTGRES_PASSWORD: ds_password
      POSTGRES_DB: ds_platform
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ds_network

  # ── Cache et broker Redis ───────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    networks:
      - ds_network

  # ── pgAdmin — Interface web PostgreSQL ─────────────────────────
  pgadmin:
    image: dpage/pgadmin4
    ports:
      - "5051:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    depends_on:
      - postgres
    networks:
      - ds_network
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  # ── Stockage objet MinIO (compatible S3) ────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    networks:
      - ds_network

volumes:
  postgres_data:
  minio_data:
  pgadmin_data:

networks:
  ds_network:
    driver: bridge
