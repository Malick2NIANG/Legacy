# ─────────────────────────────────────────────────────────────────
#  Legacy Platform — Configuration Render.com
#  Déploie : backend FastAPI (web)
#  Note : le worker Celery tourne dans le même container que FastAPI
#         via entrypoint.sh (plan gratuit — pas de background workers)
#  Pré-requis : créer les services externes d'abord
#    - Supabase       → DATABASE_URL
#    - Upstash        → REDIS_URL
#    - Backblaze B2   → MINIO_ENDPOINT, MINIO_ACCESS_KEY, MINIO_SECRET_KEY
# ─────────────────────────────────────────────────────────────────

services:

  # ── Backend FastAPI + Celery (même container) ─────────────────
  - type: web
    name: legacy-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: DATABASE_URL
        sync: false          # À renseigner dans le dashboard Render
      - key: REDIS_URL
        sync: false
      - key: MINIO_ENDPOINT
        sync: false
      - key: MINIO_ACCESS_KEY
        sync: false
      - key: MINIO_SECRET_KEY
        sync: false
      - key: MINIO_BUCKET
        value: "datasets"
      - key: MINIO_MODELS_BUCKET
        value: "models"
      - key: MINIO_SECURE
        value: "true"
      - key: ALLOWED_ORIGINS
        sync: false          # Ex: ["https://legacy-platform.vercel.app"]
      - key: FRONTEND_URL
        sync: false
      - key: TZ
        value: "Africa/Dakar"
